name: Flujo de Integración Continua
on: [push]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Autenticarse en el registry
        if: github.ref_type == 'tag'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN_CUSTOM_NAME }}

      - name: Construir imagen
        if: github.ref_type == 'tag'
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/lusplace/curso-ejemplos-ci/ejemplo-docker:${{ github.ref_name }}
            ghcr.io/lusplace/curso-ejemplos-ci/ejemplo-docker:latest
